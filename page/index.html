	<style>
/* style.css */

/* Общие стили */
.gift_card_price,
.qr-btn,
.qr-code__tabs__elem__submit {
    background-color: #0fc3ad;
}
.qr-code__tabs a.digift-site,
a.link {
    color: #0fc3ad;
}
.phone-block__input:focus,
.phone-block input[type="tel"]:focus {
    border-width: 2px;
    border-color: #0fc3ad;
}
.card-block {
    background: url('data:image/svg+xml;utf8,<svg width="618px" height="315px" viewBox="0 0 618 315" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">...</svg>') top no-repeat;
}
@media screen and (max-width: 425px) {
    .card-block {
        background: none;
    }
}
img {
    width: 100% !important;
}

/* Стили слайдера */
.sim-slider {
    position: relative;
	 width: 100%; /* или конкретный размер */
  height: 500px; /* задайте нужную высоту */
  position: relative;
  overflow: hidden;
}
.sim-slider-list {
    margin: 0;
    padding: 0;
    list-style-type: none;
    position: relative;
	
  list-style: none;
  height: 100%;
}

.sim-slider-list {
 position: absolute;
  width: 100%;
  height: 100%;

}

.sim-slider-list li img {
  width: 100%;
  height: 100%;
  object-fit: contain; /* или contain - в зависимости от нужного эффекта */
  object-position: center;
 
}

.sim-slider-element {
    width: 100%;
    transition: opacity 1s ease-in;
    opacity: 0;
    position: absolute;
    z-index: 2;
    left: 0;
    top: 0;
}

/* Стили навигационных элементов */
div.sim-slider-arrow-left,
div.sim-slider-arrow-right {
    width: 150px;
    height: 100%;
    position: absolute;
    cursor: pointer;
    opacity: 0.6;
    z-index: 20;
}
div.sim-slider-arrow-left {
    left: 0;
    top: 0;
    bottom: 0;
    display: block;
    /* background: url("./../img/system/sim-arrow-left.png") no-repeat; */
}
div.sim-slider-arrow-right {
    right: 0;
    top: 0;
    bottom: 0;
    display: block;
    /* background: url("./../img/system/sim-arrow-right.png") no-repeat; */
}
div.sim-slider-arrow-left:hover,
div.sim-slider-arrow-right:hover {
    opacity: 1.0;
}
div.sim-slider-dots {
    width: 100%;
    height: auto;
    position: absolute;
    left: 0;
    bottom: 0;
    z-index: 3;
    text-align: center;
}
span.sim-dot {
    width: 10px;
    height: 10px;
    margin: 5px 7px;
    padding: 0;
    display: inline-block;
    background-color: #BBB;

    <script type="text/javascript">
        // script.js
function Sim(sldrId) {
    let id = document.getElementById(sldrId);
    if (id) {
        this.sldrRoot = id;
    } else {
        this.sldrRoot = document.querySelector('.sim-slider');
    }

    // Slider objects
    this.sldrList = this.sldrRoot.querySelector('.sim-slider-list');
    this.sldrElements = this.sldrList.querySelectorAll('.sim-slider-element');
    this.sldrElemFirst = this.sldrList.querySelector('.sim-slider-element');
    this.leftArrow = this.sldrRoot.querySelector('div.sim-slider-arrow-left');
    this.rightArrow = this.sldrRoot.querySelector('div.sim-slider-arrow-right');
    this.indicatorDots = this.sldrRoot.querySelector('div.sim-slider-dots');

    // Initialization
    this.options = Sim.defaults;
    Sim.initialize(this);
}

Sim.defaults = {
    loop: true,
    auto: true,
    interval: 15000,
    arrows: true,
    dots: true
};

Sim.prototype.elemPrev = function (num) {
    num = num || 1;

    let prevElement = this.currentElement;
    this.currentElement -= num;
    if (this.currentElement < 0) this.currentElement = this.elemCount - 1;

    if (!this.options.loop) {
        if (this.currentElement == 0) {
            this.leftArrow.style.display = 'none';
        }
        this.rightArrow.style.display = 'block';
    }

    this.sldrElements[this.currentElement].style.opacity = '1';
    this.sldrElements[prevElement].style.opacity = '0';

    if (this.options.dots) {
        this.dotOn(prevElement);
        this.dotOff(this.currentElement);
    }
};

Sim.prototype.elemNext = function (num) {
    num = num || 1;

    let prevElement = this.currentElement;
    this.currentElement += num;
    if (this.currentElement >= this.elemCount) this.currentElement = 0;

    if (!this.options.loop) {
        if (this.currentElement == this.elemCount - 1) {
            this.rightArrow.style.display = 'none';
        }
        this.leftArrow.style.display = 'block';
    }

    this.sldrElements[this.currentElement].style.opacity = '1';
    this.sldrElements[prevElement].style.opacity = '0';

    if (this.options.dots) {
        this.dotOn(prevElement);
        this.dotOff(this.currentElement);
    }
};

Sim.prototype.dotOn = function (num) {
    this.indicatorDotsAll[num].style.cssText = 'background-color:#BBB; cursor:pointer;';
};

Sim.prototype.dotOff = function (num) {
    this.indicatorDotsAll[num].style.cssText = 'background-color:#556; cursor:default;';
};

Sim.initialize = function (that) {
    // Constants
    that.elemCount = that.sldrElements.length;

    // Variables
    that.currentElement = 0;
    let bgTime = getTime();

    // Functions
    function getTime() {
        return new Date().getTime();
    };

    function setAutoScroll() {
        that.autoScroll = setInterval(function () {
            let fnTime = getTime();
            if (fnTime - bgTime + 10 > that.options.interval) {
                bgTime = fnTime;
                that.elemNext()
            }
        }, that.options.interval)
    };

    if (that.elemCount <= 1) {
        that.options.auto = false;
        that.options.arrows = false;
        that.options.dots = false;
        that.leftArrow.style.display = 'none';
        that.rightArrow.style.display = 'none';
    }
    if (that.elemCount >= 1) {
        that.sldrElemFirst.style.opacity = '1';
    }

    if (!that.options.loop) {
        that.leftArrow.style.display = 'none';
        that.options.auto = false;
    } else if (that.options.auto) {
        setAutoScroll();
        that.sldrList.addEventListener('mouseenter', function () {
            clearInterval(that.autoScroll);
        }, false);
        that.sldrList.addEventListener('mouseleave', setAutoScroll, false);
    }

    if (that.options.arrows) {
        that.leftArrow.addEventListener('click', function () {
            let fnTime = getTime();
            if (fnTime - bgTime > 1000) {
                bgTime = fnTime;
                that.elemPrev();
            }
        }, false);
        that.rightArrow.addEventListener('click', function () {
            let fnTime = getTime();
            if (fnTime - bgTime > 1000) {
                bgTime = fnTime;
                that.elemNext();
            }
        }, false);
    } else {
        that.leftArrow.style.display = 'none';
        that.rightArrow.style.display = 'none';
    }

    if (that.options.dots) {
        let sum = '', diffNum;
        for (let i = 0; i < that.elemCount; i++) {
            sum += '<span class="sim-dot"></span>';
        }
        that.indicatorDots.innerHTML = sum;
        that.indicatorDotsAll = that.sldrRoot.querySelectorAll('span.sim-dot');
        for (let n = 0; n < that.elemCount; n++) {
            that.indicatorDotsAll[n].addEventListener('click', function () {
                diffNum = Math.abs(n - that.currentElement);
                if (n < that.currentElement) {
                    bgTime = getTime();
                    that.elemPrev(diffNum);
                } else if (n > that.currentElement) {
                    bgTime = getTime();
                    that.elemNext(diffNum);
                }
            }, false);
        }
        that.dotOff(0);
        for (let i = 1; i < that.elemCount; i++) {
            that.dotOn(i);
        }
    }
};

window.onload = () => { new Sim(); }

    </script>

$(document).ready(function () {
    var _w = $(window).width();
    if(_w<991) {

        $('.open-btn img').click(function () {
            $(this).fadeOut();
            startAnimation();
        });
    }
    else
    {
        myHandler();
    }
    function startAnimation() {
        // 1. Show back of envelope smoothly
        setTimeout(
            function () {
                // 1.1 Hide front envelope


                    // 2. Move envelope down
                    var envHeight = $('#envelope-front').height();
                    var downHeight = parseInt(envHeight * 0.67);

                    var $elem = $('.envelop-rotate');

                    $({deg: 0}).animate({deg: 90}, {
                        duration: 400,
                        step: function (now) {

                            $elem.css({
                                transform: 'rotateX(' + now + 'deg)'
                            });
                        },
                        complete: function () {
                            $('#envelope-back').addClass('envelope--open');
                            $({deg: 90}).animate({deg: 180}, {
                                duration: 400,
                                step: function (now) {

                                    $elem.css({
                                        transform: 'rotateX(' + now + 'deg)'
                                    });
                                },
                                complete: function () {
                                    setTimeout(function () {
                                        $('.envelope-flaps').css('z-index', '5');
                                        $('#gift-card').css('overflow', 'visible').css('z-index', '4');

                                        setTimeout(function () {
                                            $('.envelope-flaps').css('display', 'none');
                                        }, 2001);
                                    });
                                    $('#gift-card').animate(

                                        {top: '-500px'}
                                    );
                                    $('.envelope-flaps, .envelop-rotate').animate(
                                        // { top: '-' + (downHeight + additional) + 'px' },
                                        {
                                            top: '300px',
                                            opacity: 0
                                        }, 1000
                                    )
                                }
                            });
                        }
                    });


                    //
                    $('#envelope-back').animate(
                        {top: 500 + 'px'}, 1000
                    );



            },
            200
        );

    }


// document.getElementById('video').addEventListener('ended', myHandler, false);



function myHandler(e) {

    // What you want to do after the event
    // $("#video").hide();
    $(".animation-block").show();
    $('.open-btn img').click(function () {
        startAnimation();
        $(this).fadeOut();
    });


    function startAnimation() {


        // 1. Show back of envelope smoothly
        setTimeout(
            function () {
                    // 2. Move envelope down
                    var envHeight = $('#envelope-front').height();
                    var downHeight = parseInt(envHeight * 0.67);





                            // 3. Hide flap-up
                            // $('#envelope-back').removeClass('envelope--close');
                            // $('#envelope-back').addClass('envelope--open');
                            var $elem = $('.envelop-rotate');

                            $({deg: 0}).animate({deg: 90}, {
                                duration: 400,
                                step: function (now) {
                                    // in the step-callback (that is fired each step of the animation),
                                    // you can use the `now` paramter which contains the current
                                    // animation-position (`0` up to `angle`)
                                    $elem.css({
                                        transform: 'rotateX(' + now + 'deg)'
                                    });
                                },
                                complete: function () {
                                    $('#envelope-back').addClass('envelope--open');
                                    $({deg: 90}).animate({deg: 180}, {
                                        duration: 400,
                                        step: function (now) {
                                            // in the step-callback (that is fired each step of the animation),
                                            // you can use the `now` paramter which contains the current
                                            // animation-position (`0` up to `angle`)
                                            $elem.css({
                                                transform: 'rotateX(' + now + 'deg)'
                                            });
                                        },
                                        complete: function () {
                                            setTimeout(function () {
                                                $('.envelope-flaps').css('z-index', '5');
                                                $('#gift-card').css('overflow', 'visible').css('z-index', '4')

                                                setTimeout(function () {
                                                    $('.envelope-flaps').css('display', 'none');
                                                }, 1000);
                                            });
                                            $('#gift-card').animate(
                                                // { top: '-' + (downHeight + additional) + 'px' },
                                                {top: '-450px'}
                                            );
                                            $('.envelope-flaps, .envelop-rotate').animate(
                                                // { top: '-' + (downHeight + additional) + 'px' },
                                                {
                                                    top: '500px',
                                                    opacity: 0
                                                }, 500
                                            )
                                        }
                                    });
                                }
                            });


                            //
                            $('#envelope-back').animate(
                                {top: 500 + 'px'}, 1000
                            );

            },
            200
        );
    }
}

    setTimeout(function() {
        $('.animation-block').removeClass('hide').addClass('bounceInLeft animated');
        setTimeout(function() {
            $('#_jsi_tooltip-holder').addClass('hover');
        }, 4000);
    }, 1000);

    // Masked input
//    $('.phone-input').mask('+7 (999) 999-9999');
//            var patt = /^\+7 \(\d{3}\) \d{3}\-\d{4}$/i;

    var patt = /^\+7 \d{3} \d{3}\-\d{4}$/i;

    if ( $('#_jsi_gc_phone_input').length ) {
        var phone_input = new Cleave('#_jsi_gc_phone_input', {
            prefix: '+7',
//            noImmediatePrefix: true,
            blocks: [2, 3, 3, 4],
            delimiters: [' ', ' ', '-'],
            numericOnly: true,
            onValueChanged: function (e) {
                if ( patt.test(e.target.value) == false ) {
                    $('#_jsi_gc_btn_phone_submit').addClass('disabled');
                } else {
                    $('#_jsi_gc_btn_phone_submit').removeClass('disabled');
                }

                $('#_jsi_gc_phone_dummy').val(e.target.value);
            }
        });
        phone_input.setRawValue($('#_jsi_gc_phone_input').data('phone'));
    }

    $('._jsc_gc_input').on('focusout change', function () {
        if ( $(this).val() != '' ) {
            $(this).addClass('focus');
        } else {
            $(this).removeClass('focus');
        }
    });
    $('._jsc_gc_input').change();

    $('#_jsi_gc_btn_open_phone_block').on('click', function () {
        $(this).slideUp('slow');
        $('#_jsi_gc_phone_block').slideDown('slow');
    });

    $('#_jsi_gc_btn_phone_submit').on('click', function () {
        $('#_jsi_gc_form_send_pin').submit();
    });

    var is_sending_phone = false;

    $('#_jsi_gc_form_send_pin').on('submit', function () {

        var phone = $('#_jsi_gc_phone_input').val(),
            act_code = $(this).data('act_code');

        if ( patt.test(phone) == false || is_sending_phone ) {
            return false;
        }

        $.ajax({
            type: "POST",
            dataType: "json",
            url: "/partner/card/sendPin",
            data: {
                receiver_mobile: phone,
                item_activation_code: act_code
            },
            beforeSend : function (xhr) {
                $('#_jsi_gc_phone_error').text('');
                $('#_jsi_gc_phone_block').addClass('sending');

                is_sending_phone = true;
            },
            complete: function (jqXHR, textStatus) {
                is_sending_phone = false;
                $('#_jsi_gc_phone_block').removeClass('sending');
            },
            success: function(data) {
                if ( data.success == 1 ) {
                    $('#_jsi_gc_phone_block').fadeOut('slow', function() {
                        $('#_jsi_gc_form_use_card_block').slideDown('slow');
                    });

                    $('#_jsi_gc_buttons_block').slideDown('slow');

                } else if ( data.error == 1 ) {
                    $('#_jsi_gc_phone_error').text(data.error_msg);
                }
            }
        });

        return false;
    });

    $('#_jsi_gc_btn_resend_sms').on('click', _.throttle(function () {
        $('#_jsi_gc_btn_resend_sms').addClass('disabled');
        $('#_jsi_gc_form_send_pin').submit();
        setTimeout(function() {
            $('#_jsi_gc_btn_resend_sms').removeClass('disabled');
        }, 30000);
    }, 30000, { 'trailing': false }));

    $('#_jsi_gc_pin').on('input change', function () {
        if ( $(this).val() == '' ) {
            $('#_jsi_gc_form_use_card_submit').addClass('disabled');
        } else {
            $('#_jsi_gc_form_use_card_submit').removeClass('disabled');
        }
    });
    $('#_jsi_gc_pin').change();

    $('#_jsi_gc_form_use_card_submit').on('click', function () {
        $('#_jsi_gc_form_use_card').submit();
    });

    var is_checking_pin = false;

    $('#_jsi_gc_form_use_card').on('submit', function () {

        var pin = $('#_jsi_gc_pin').val(),
            act_code = $(this).data('act_code');

        if ( pin == '' || is_checking_pin ) {
            return false;
        }

        $.ajax({
            type: "POST",
            dataType: "json",
            url: "/partner/card/checkPin",
            data: {
                pin: pin,
                activation_code: act_code
            },
            beforeSend : function (xhr) {
                $('#_jsi_gc_phone_error').text('');
                $('#_jsi_gc_form_use_card_block').addClass('sending');

    const element_title = document.getElementsByClassName('modal-header1_title');

    const element_body = document.getElementsByClassName('element_body');

    $('.wrap1, a').toggleClass('active');
    if (window.innerWidth < 450) {
        window.scroll(0, 295);
    } else {
        window.scroll(0, 130);
    }
}

        const jsonData = {
  "title": "Поздравление",
  "event": "День Рождения",

  "wishes": [
	"Поздравляю с днем рождения!",

	<script type="text/javascript">
        document.addEventListener("DOMContentLoaded", function() {
			document.title = jsonData.title;
			 
            // Используем jsonData из setings.js
            document.getElementById("event").innerText = jsonData.event;
            document.getElementById("recipientName").innerText = jsonData.recipientName;
            document.getElementById("senderName").innerText = jsonData.senderName;
            document.getElementById("personalMessage").innerText = jsonData.personalMessage;
			
			// Заполнение пожеланий
			const wishesContainer = document.getElementById("wishes");
			jsonData.wishes.forEach((wish) => {
				const wishElement = document.createElement('div'); // Создаём новый элемент для пожелания
				wishElement.innerText = wish; // Устанавливаем текст пожелания
				wishesContainer.appendChild(wishElement); // Добавляем элемент в контейнер
			});
					
            // Заполнение изображений слайдера
            const simSliderList = document.querySelector('.sim-slider-list');
			// Проверка длины массива изображений и создание нового массива, если длина больше 10
			const imagesToDisplay = jsonData.images.length > 10 ? jsonData.images.slice(0, 10) : jsonData.images;
            jsonData.images.forEach((image) => {
                const li = document.createElement('li');
				li.classList.add('sim-slider-element');
                const img = document.createElement('img');
                img.src = image;
                li.appendChild(img);
                simSliderList.appendChild(li);
            });

            // Установка QR-кода
            const qrCodeElement = document.getElementById('qr');
			if (jsonData.qrCode) {
				const qrImg = document.createElement('img');
				qrImg.src = jsonData.qrCode;
				qrCodeElement.appendChild(qrImg);
			}
			
			// Динамическое создание push-pins
			const pushPinsContainer = document.querySelector('.push-pins');
			if (jsonData.pushPins && jsonData.pushPins.length > 0) {
				const defaultClasses = ['price-left', 'price-right', 'price-lb', 'price-rb']; // Массив классов по умолчанию
				// Получаем только первые 4 пин-кода
				const limitedPushPins = jsonData.pushPins.slice(0, 4);
				
				limitedPushPins.forEach((pushPin, index) => {
					// Проверка, если объект pushPin пустой
					if (!pushPin || Object.keys(pushPin).length === 0) {
						return; // Пропустить текущую итерацию
					}
					
					const pinDiv = document.createElement('div');
					
					// Используем класс из pushPin, если он есть, иначе берем из массива классов по умолчанию
					const className = pushPin.class || defaultClasses[index] || 'default-class'; // Замените 'default-class' на ваш класс по умолчанию
					
					pinDiv.classList.add(className); // Добавление класса
					const img = document.createElement('img');
					img.src = pushPin.src;
					pinDiv.appendChild(img);
					pushPinsContainer.appendChild(pinDiv);
				});
			}
        });

    </script>
