<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8" />
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="language" content="ru" />

    <title></title>

    <link rel="icon" type="image/png" href="./img/system/favicon.ico" sizes="96x96">

    <link rel="stylesheet" type="text/css" href="./css/partner_card.css@v=1614772361.css"/>
    <script type="text/javascript" src="./script/clipboard.min.js@v=1614772361"></script>
    <script type="text/javascript" src="./script/jquery-2.1.3.min.js@v=1614772361"></script>
    <script type="text/javascript" src="./script/lodash.min.js@v=1614772361"></script>
	<link rel="stylesheet" href="./css/style.css">
    <script type="text/javascript" src="./script/script.js"></script>
  
    <div class="animation-block hide">
      <div class="envelope" id="envelope-back">
        <div class="envelop-rotate">
          <div class="envelope-flap envelope-flap--up" id="envelope-flap-up"></div>
          <a href="javascript:void(0);" class="open-btn">
            <span class="tooltip-holder" id="_jsi_tooltip-holder">
              <span class="tooltip">Нажмите чтобы открыть</span>
              <img src="./img/system/button2.png" />
            </span>
          </a>
        </div>

        <div class="gift-card-block" id="gift-card">
          <div class="gift-card">
            <div class="gift-card__inner">
              <div class="header">

                <div class="card-block card-block--no_sparks">
                  <div class="card-container">
                    <div class="sim-slider">
                      <ul class="sim-slider-list">
						  <!-- это экран -->
                          <li><img src="./img/system/fot.gif" alt="screen"></li> 
						  <!-- ------- -->
						  <!-- слайдер с картинками -->                          
                      </ul>
                      <div class="sim-slider-arrow-left"></div>
                      <div class="sim-slider-arrow-right"></div>
                      <div class="sim-slider-dots"></div>
                  </div>
				  
					<!-- Красивые смайлики или что-то подобное по рамке слайдера -->
					<div class="push-pins"></div>
                  </div>
                </div>
              </div>

              <div class="qr-code">
                <div class="container container--header">
                  <h1 id="event"></h1>
                </div>

                <div class="container container--data">
                  <div class="row-flex">
                    <div class="qr-col-info-flex qr-col-info-flex--alter">
                      <div class="wrap1">
                        <div class="content1">
                          <div class="modal-close1">
                            <div class="modal-close1_x" onclick="closePopupRulesOffer()">×</div>
                          </div>
                          <div class="modal-header1">
                            <h2 class="modal-header1_title"></h2>
                          </div>
                          <div class="offer1">
                            <p class="element_body"></p>
                          </div>
                        </div>
                      </div>
                      <div class="qr-col-info-flex-wrap">
                        <div class="qr-code__tabs" id="qr">
						  <!-- Можно прикрепить сертификат или qr-code или доп. картинку -->
                        </div>
                      </div>

                      <div class="mail-text">
					  
                        <div class="mail-text__container">
                          <div class="mail-text__grats">
                            <p class="name" id="recipientName"></p>
                            <p id="wishes"></p>
                            <p class="name send-name" id="senderName"></p>
                            <br>
                            <p id="personalMessage"></p>
                          </div>
                        </div>
                      </div>
                   
				   </div>
                  </div>
                </div>
              </div>

              <div class="footer">
                <div class="container">
                  <div class="row">
                    <div class="col-md-3 col-sm-3 footer-logo-col"></div>
                    <div class="col-md-9 col-sm-9">
                      <ul class="footer__menu"></ul>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="envelope-flaps">
          <div class="envelope-flap envelope-flap--left"></div>
          <div class="envelope-flap envelope-flap--right"></div>
          <div class="envelope-flap envelope-flap--bottom"></div>
        </div>
      </div>
    </div>
    <script type="text/javascript" src="./script/cleave.min.js@v=1614772361"></script>
    <script type="text/javascript" src="./script/partner_card.js@v=1614772361"></script>
	<script type="text/javascript" src="./../setings.js"></script>
	<script type="text/javascript" src="./script/json_loader.js"></script>
	<script type="text/javascript" src="./script/constructor_integration.js"></script>
	
  </body>
</html>
